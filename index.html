<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #f2efe7;
        background: #08090b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        width: min(100% - 40px, 820px);
        padding: 64px 0;
      }

      .mattress {
        position: relative;
        width: min(100%, 560px);
        aspect-ratio: 2.7;
        margin-bottom: 34px;
        transform: perspective(720px) rotateX(58deg) rotateZ(-8deg);
        transform-origin: center bottom;
      }

      .mattress::before,
      .mattress::after {
        position: absolute;
        content: "";
        border: 1px solid rgba(242, 239, 231, 0.28);
      }

      .mattress::before {
        inset: 0;
        border-radius: 26px;
        background:
          radial-gradient(circle at 16% 28%, rgba(128, 255, 216, 0.42) 0 8px, transparent 9px),
          radial-gradient(circle at 35% 62%, rgba(128, 255, 216, 0.28) 0 7px, transparent 8px),
          radial-gradient(circle at 56% 31%, rgba(128, 255, 216, 0.34) 0 7px, transparent 8px),
          radial-gradient(circle at 78% 60%, rgba(128, 255, 216, 0.24) 0 8px, transparent 9px),
          linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04)),
          #141821;
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.42),
          inset 0 0 34px rgba(128, 255, 216, 0.08);
      }

      .mattress::after {
        right: 2%;
        bottom: -18%;
        left: 8%;
        height: 28%;
        border-radius: 0 0 24px 24px;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(128, 255, 216, 0.12) 0 1px,
            transparent 1px 42px
          ),
          #0f131a;
        transform: skewX(-36deg);
        transform-origin: top left;
      }

      .pillow {
        position: absolute;
        top: 12%;
        left: 9%;
        z-index: 1;
        width: 28%;
        height: 30%;
        border: 1px solid rgba(242, 239, 231, 0.32);
        border-radius: 18px;
        background: linear-gradient(135deg, #edf7f1, #9adbc8);
        box-shadow: inset -12px -10px 22px rgba(8, 9, 11, 0.14);
      }

      p {
        margin: 0 0 18px;
        color: #b8b1a5;
        font-size: 1.1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mattress" role="img" aria-label="Minimal mattress illustration">
        <div class="pillow"></div>
      </div>
      <p>Welcome to Mattress, made by Matt</p>
    </main>
  </body>
</html>
