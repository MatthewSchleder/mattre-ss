<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #f2efe7;
        background: #08090b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        display: grid;
        width: min(100% - 48px, 680px);
        padding: 48px 0;
        place-items: center;
      }

      .mattress {
        width: min(100%, 500px);
        height: auto;
        margin-bottom: 28px;
        overflow: visible;
      }

      p {
        margin: 0;
        color: #d4cdc2;
        font-size: clamp(1rem, 3.8vw, 1.2rem);
        line-height: 1.6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        class="mattress"
        role="img"
        aria-label="Minimal mattress illustration"
        viewBox="0 0 640 320"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <linearGradient id="mattressTop" x1="90" x2="550" y1="86" y2="188">
            <stop stop-color="#f8fff9" />
            <stop offset="1" stop-color="#d7eee7" />
          </linearGradient>
          <linearGradient id="mattressSide" x1="90" x2="550" y1="185" y2="250">
            <stop stop-color="#a8d8cc" />
            <stop offset="1" stop-color="#648a83" />
          </linearGradient>
          <linearGradient id="pillow" x1="116" x2="248" y1="58" y2="124">
            <stop stop-color="#ffffff" />
            <stop offset="1" stop-color="#dff7ef" />
          </linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity="0.34" />
          </filter>
        </defs>

        <g filter="url(#shadow)">
          <rect
            x="78"
            y="118"
            width="484"
            height="118"
            rx="34"
            fill="url(#mattressTop)"
            stroke="#f2efe7"
            stroke-opacity="0.34"
            stroke-width="2"
          />
          <path
            d="M80 183 H560 V226 Q560 248 538 248 H102 Q80 248 80 226 Z"
            fill="url(#mattressSide)"
            opacity="0.72"
          />
          <path
            d="M98 184 H542"
            fill="none"
            stroke="#284b48"
            stroke-opacity="0.38"
            stroke-width="2"
          />
          <rect
            x="112"
            y="78"
            width="152"
            height="72"
            rx="24"
            fill="url(#pillow)"
            stroke="#f2efe7"
            stroke-opacity="0.45"
            stroke-width="2"
          />
          <g fill="none" stroke="#284b48" stroke-linecap="round" stroke-opacity="0.28" stroke-width="2">
            <path d="M152 124 C212 144 284 144 344 124" />
            <path d="M312 124 C372 144 444 144 504 124" />
            <path d="M152 176 C212 156 284 156 344 176" />
            <path d="M312 176 C372 156 444 156 504 176" />
          </g>
          <g fill="#284b48" opacity="0.42">
            <circle cx="214" cy="150" r="5" />
            <circle cx="320" cy="150" r="5" />
            <circle cx="426" cy="150" r="5" />
            <circle cx="268" cy="202" r="5" />
            <circle cx="374" cy="202" r="5" />
          </g>
        </g>
      </svg>
      <p>Welcome to Mattress, made by Matt</p>
    </main>
  </body>
</html>
