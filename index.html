<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #f2efe7;
        background: #08090b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        width: min(100% - 40px, 820px);
        padding: 64px 0;
      }

      .mattress {
        width: min(100%, 560px);
        height: auto;
        margin-bottom: 32px;
        overflow: visible;
      }

      p {
        margin: 0 0 18px;
        color: #b8b1a5;
        font-size: 1.1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        class="mattress"
        role="img"
        aria-label="Minimal mattress illustration"
        viewBox="0 0 640 300"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <linearGradient id="top" x1="120" x2="530" y1="38" y2="180">
            <stop stop-color="#293044" />
            <stop offset="1" stop-color="#121722" />
          </linearGradient>
          <linearGradient id="side" x1="120" x2="520" y1="160" y2="255">
            <stop stop-color="#171d2a" />
            <stop offset="1" stop-color="#0b0f17" />
          </linearGradient>
          <linearGradient id="pillow" x1="170" x2="300" y1="72" y2="135">
            <stop stop-color="#e9fff7" />
            <stop offset="1" stop-color="#8ce5cc" />
          </linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="28" stdDeviation="22" flood-color="#000" flood-opacity="0.35" />
          </filter>
        </defs>

        <g filter="url(#shadow)">
          <path
            d="M116 82 Q120 64 140 62 L514 42 Q535 41 545 58 L592 142 Q601 158 586 169 L478 247 Q463 258 444 257 L71 226 Q51 224 45 207 L17 125 Q11 109 27 100 Z"
            fill="url(#top)"
            stroke="#f2efe7"
            stroke-opacity="0.24"
            stroke-width="2"
          />
          <path
            d="M71 226 L444 257 Q463 258 478 247 L586 169 L585 202 Q585 217 572 226 L479 289 Q464 299 445 297 L89 270 Q72 269 65 253 L45 207 Q51 224 71 226 Z"
            fill="url(#side)"
            stroke="#f2efe7"
            stroke-opacity="0.18"
            stroke-width="2"
          />
          <path
            d="M124 91 L472 72 Q490 71 499 86 L525 131 Q532 143 520 151 L449 202 Q438 210 424 209 L84 183 Q70 182 66 169 L52 128 Q48 116 60 110 Z"
            fill="none"
            stroke="#80ffd8"
            stroke-opacity="0.34"
            stroke-width="2"
          />
          <rect
            x="142"
            y="82"
            width="136"
            height="60"
            rx="20"
            fill="url(#pillow)"
            opacity="0.95"
            transform="rotate(-4 210 112)"
          />
          <path
            d="M135 158 C215 139 324 132 508 127"
            fill="none"
            stroke="#80ffd8"
            stroke-linecap="round"
            stroke-opacity="0.26"
            stroke-width="2"
          />
          <path
            d="M122 196 C224 204 332 212 463 221"
            fill="none"
            stroke="#80ffd8"
            stroke-linecap="round"
            stroke-opacity="0.18"
            stroke-width="2"
          />
          <g fill="#80ffd8" opacity="0.28">
            <circle cx="328" cy="104" r="5" />
            <circle cx="412" cy="95" r="5" />
            <circle cx="504" cy="117" r="5" />
            <circle cx="246" cy="174" r="5" />
            <circle cx="365" cy="184" r="5" />
          </g>
        </g>
      </svg>
      <p>Welcome to Mattress, made by Matt</p>
    </main>
  </body>
</html>
