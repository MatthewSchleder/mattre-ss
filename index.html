<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #171717;
        background: #f7f4ee;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(100% - 48px, 760px);
      }

      p {
        margin: 0 0 18px;
        color: #5f5a52;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(4rem, 16vw, 9rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      a {
        color: #171717;
        font-weight: 700;
        text-decoration-thickness: 2px;
        text-underline-offset: 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>mattre.ss</h1>
      <p>A small page for a new domain.</p>
      <p><a href="mailto:hello@mattre.ss">hello@mattre.ss</a></p>
    </main>
  </body>
</html>
