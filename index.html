<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #f2efe7;
        background: #08090b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        width: min(100% - 40px, 820px);
        padding: 64px 0;
      }

      p {
        margin: 0 0 18px;
        color: #b8b1a5;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .eyebrow {
        margin-bottom: 22px;
        color: #80ffd8;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .ascii {
        display: block;
        max-width: 100%;
        margin: 0 0 28px;
        overflow-x: auto;
        color: #80ffd8;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: clamp(0.9rem, 2.4vw, 1.2rem);
        line-height: 1.15;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">made by Matt</p>
      <pre class="ascii" aria-label="ASCII art mattress">
   ______________________
  /_____________________/|
 |  _  _  _  _  _  _   ||
 |______________________|/
      </pre>
      <p>Welcome to mattress</p>
    </main>
  </body>
</html>
