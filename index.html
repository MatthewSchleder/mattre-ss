<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #f2efe7;
        background: #08090b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        display: grid;
        width: min(100% - 48px, 680px);
        padding: 48px 0;
        place-items: center;
      }

      .mattress {
        width: min(100%, 520px);
        height: auto;
        margin-bottom: 24px;
        overflow: visible;
      }

      p {
        margin: 0;
        color: #d4cdc2;
        font-size: clamp(1rem, 3.8vw, 1.2rem);
        line-height: 1.6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        class="mattress"
        role="img"
        aria-label="Minimal mattress illustration"
        viewBox="0 0 640 360"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <linearGradient id="top" x1="150" x2="490" y1="90" y2="220">
            <stop stop-color="#252b3c" />
            <stop offset="1" stop-color="#141925" />
          </linearGradient>
          <linearGradient id="side" x1="120" x2="520" y1="210" y2="310">
            <stop stop-color="#181f2d" />
            <stop offset="1" stop-color="#0b0f17" />
          </linearGradient>
          <linearGradient id="pillow" x1="146" x2="294" y1="105" y2="160">
            <stop stop-color="#f1fff9" />
            <stop offset="1" stop-color="#b3f0df" />
          </linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
            <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.38" />
          </filter>
        </defs>

        <g filter="url(#shadow)">
          <path
            d="M78 142 Q82 112 113 108 L518 76 Q546 74 560 98 L610 184 Q625 209 604 230 L535 298 Q520 313 498 314 L112 292 Q83 290 74 263 L45 176 Q37 150 78 142 Z"
            fill="url(#top)"
            stroke="#f2efe7"
            stroke-opacity="0.22"
            stroke-width="2"
          />
          <path
            d="M112 292 L498 314 Q520 313 535 298 L604 230 L602 254 Q601 274 586 288 L531 336 Q516 349 494 348 L128 326 Q96 324 87 296 L74 263 Q83 290 112 292 Z"
            fill="url(#side)"
            stroke="#f2efe7"
            stroke-opacity="0.18"
            stroke-width="2"
          />
          <path
            d="M98 157 Q101 134 126 131 L498 102 Q521 100 533 119 L570 181 Q581 199 565 214 L516 260 Q503 272 485 271 L124 252 Q101 251 94 229 L73 171 Q68 154 98 157 Z"
            fill="none"
            stroke="#80ffd8"
            stroke-opacity="0.4"
            stroke-width="2"
          />
          <path
            d="M143 126 L263 117 Q283 116 289 135 L295 155 Q300 174 280 178 L159 187 Q139 188 133 169 L127 149 Q121 130 143 126 Z"
            fill="url(#pillow)"
            opacity="0.95"
            stroke="#f2efe7"
            stroke-opacity="0.24"
            stroke-width="2"
          />
          <path
            d="M112 220 C232 229 365 236 516 242"
            fill="none"
            stroke="#80ffd8"
            stroke-linecap="round"
            stroke-opacity="0.22"
            stroke-width="2"
          />
          <path
            d="M150 154 C262 144 379 136 508 127"
            fill="none"
            stroke="#80ffd8"
            stroke-linecap="round"
            stroke-opacity="0.2"
            stroke-width="2"
          />
          <g fill="#80ffd8" opacity="0.28">
            <circle cx="345" cy="146" r="5" />
            <circle cx="442" cy="137" r="5" />
            <circle cx="523" cy="171" r="5" />
            <circle cx="238" cy="217" r="5" />
            <circle cx="371" cy="224" r="5" />
          </g>
        </g>
      </svg>
      <p>Welcome to Mattress, made by Matt</p>
    </main>
  </body>
</html>
