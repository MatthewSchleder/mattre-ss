<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="mattre.ss" />
    <title>mattre.ss</title>
    <style>
      :root {
        color: #f2efe7;
        background: #08090b;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        display: grid;
        width: min(100% - 48px, 680px);
        padding: 48px 0;
        place-items: center;
      }

      .mattress {
        width: min(100%, 360px);
        height: auto;
        margin-bottom: 30px;
        overflow: visible;
      }

      p {
        margin: 0;
        color: #d4cdc2;
        font-size: clamp(1rem, 3.8vw, 1.2rem);
        line-height: 1.6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <svg
        class="mattress"
        role="img"
        aria-label="Minimal mattress illustration"
        viewBox="0 0 420 180"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M74 70 H346 Q372 70 372 96 V118 Q372 144 346 144 H74 Q48 144 48 118 V96 Q48 70 74 70 Z"
          fill="none"
          stroke="#d4cdc2"
          stroke-linejoin="round"
          stroke-opacity="0.72"
          stroke-width="3"
        />
        <path
          d="M92 42 H178 Q194 42 194 58 V70 H76 V58 Q76 42 92 42 Z"
          fill="none"
          stroke="#d4cdc2"
          stroke-linejoin="round"
          stroke-opacity="0.68"
          stroke-width="3"
        />
        <path
          d="M54 108 H366"
          fill="none"
          stroke="#80ffd8"
          stroke-linecap="round"
          stroke-opacity="0.34"
          stroke-width="2"
        />
        <path
          d="M96 88 C140 102 184 102 228 88 C272 74 316 74 360 88"
          fill="none"
          stroke="#d4cdc2"
          stroke-linecap="round"
          stroke-opacity="0.28"
          stroke-width="2"
        />
      </svg>
      <p>Welcome to Mattress, made by Matt</p>
    </main>
  </body>
</html>
