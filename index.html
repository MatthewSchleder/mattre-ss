      :root {

        font-family:

          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 141, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 80% 70%, rgba(90, 255, 203, 0.12), transparent 28rem),
          #08090b;
      }

      main {
        width: min(100% - 40px, 820px);
        padding: 64px 0;
      }

      p {
        margin: 0 0 18px;
        color: #b8b1a5;
        font-size: 1.1rem;
        line-height: 1.6;
      }
